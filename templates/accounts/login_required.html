{% extends 'base.html' %}

{% block title %}Login Required - ShopEase{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow text-center">
                <div class="card-body p-5">
                    <i class="bi bi-lock display-1 text-primary mb-4"></i>
                    <h2 class="mb-3">Login Required</h2>
                    <p class="text-muted mb-4">Please login or create an account to continue shopping.</p>

                    <div class="d-grid gap-3">
                        <a href="{% url 'accounts:login' %}?next={{ next }}" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </a>
                        <a href="{% url 'accounts:register' %}?next={{ next }}" class="btn btn-outline-success btn-lg">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </a>
                    </div>

                    <hr class="my-4">

                    <a href="{% url 'products:product_list' %}" class="text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Continue Browsing
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
