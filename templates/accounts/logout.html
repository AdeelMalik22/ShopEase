{% extends 'base.html' %}

{% block title %}Logged Out - ShopEase{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="mb-4">
        <i class="bi bi-box-arrow-right display-1 text-primary"></i>
    </div>

    <h1 class="mb-3">You've been logged out</h1>
    <p class="lead text-muted mb-4">Thank you for visiting ShopEase. Come back soon!</p>

    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'accounts:login' %}" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login Again
        </a>
        <a href="{% url 'products:home' %}" class="btn btn-outline-primary">
            <i class="bi bi-house me-2"></i>Go to Homepage
        </a>
    </div>
</div>
{% endblock %}
